<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All About Destiny | Cloud Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
  <style>
    /* 所有的艺术样式我都保留了 */
    body { background-color: #fff; color: #000; font-family: 'Noto Serif SC', serif; overflow-x: hidden; scroll-behavior: smooth; }
    .star-outline { position: absolute; top: 10%; left: 20%; width: 65vw; opacity: 0.08; z-index: -1; pointer-events: none; transition: transform 0.1s ease-out; }
    .scrapbook-section { position: relative; min-height: 160vh; width: 100%; border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #fafafa; overflow: hidden; }
    .scrap-item { position: absolute; transition: transform 0.3s; z-index: 10; }
    .delete-mark { position: absolute; bottom: -10px; right: -10px; width: 20px; height: 20px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; z-index: 100; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; align-items: center; justify-content: center; }
    #syncStatus { position: fixed; top: 10px; right: 10px; font-size: 10px; color: #ccc; z-index: 2000; }
  </style>
</head>
<body>
  <div id="syncStatus">Cloud: Connecting...</div>
  <header class="min-h-screen flex items-center justify-center px-10">
    <h1 class="text-8xl font-light">DESTINY.</h1>
  </header>

  <section class="scrapbook-section" id="scrapbook">
    <div class="absolute top-10 left-10 z-[100] flex gap-4">
      <button onclick="openModal('scrapText')" class="bg-black text-white text-[10px] px-6 py-2 uppercase">+ Text</button>
      <button onclick="openModal('scrapImage')" class="bg-black text-white text-[10px] px-6 py-2 uppercase">+ Image URL</button>
    </div>
  </section>

  <div id="globalModal" class="modal">
    <div class="modal-content text-center">
      <textarea id="modalInput" class="w-full h-40 border-b border-black outline-none p-4" placeholder="Write here..."></textarea>
      <div class="mt-6 flex justify-center gap-6">
        <button onclick="closeModal()" class="uppercase text-xs">Cancel</button>
        <button onclick="saveContent()" class="uppercase text-xs font-bold underline">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = "https://ykymzuaobitdhoyyqmxp.supabase.co";
    const SB_KEY = "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let db = { customScraps: [] };

    async function sync() {
        document.getElementById('syncStatus').innerText = "Syncing...";
        await _supabase.from('archive_data').upsert({ id: 1, content: db });
        document.getElementById('syncStatus').innerText = "Saved";
    }

    async function load() {
        const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
        if (data) { db = data.content; render(); }
        document.getElementById('syncStatus').innerText = "Connected";
    }

    function render() {
        const container = document.getElementById('scrapbook');
        container.querySelectorAll('.scrap-item').forEach(i => i.remove());
        db.customScraps.forEach((s, idx) => {
            const div = document.createElement('div');
            div.className = 'scrap-item';
            div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
            div.innerHTML = (s.type === 'text' ? `<p class="bg-white p-4 shadow-xl border">${s.content}</p>` : `<img src="${s.content}" class="w-64 shadow-2xl">`) + 
                            `<div class="delete-mark" onclick="del(${idx})">×</div>`;
            container.appendChild(div);
        });
    }

    let mode = '';
    function openModal(m) { mode = m; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; }
    
    async function saveContent() {
        const val = document.getElementById('modalInput').value;
        if(!val) return;
        db.customScraps.push({ type: mode==='scrapText'?'text':'img', content: val, x: Math.random()*500, y: Math.random()*800 + 100 });
        render(); await sync(); closeModal();
        document.getElementById('modalInput').value = '';
    }

    async function del(idx) { db.customScraps.splice(idx,1); render(); await sync(); }

    window.onload = load;
  </script>
</body>
</html>
