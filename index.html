<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All About Destiny | Archive V2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
  <style>
    :root { --main-bg: #fff; --main-text: #000; }
    body { background-color: var(--main-bg); color: var(--main-text); font-family: 'Noto Serif SC', serif; overflow-x: hidden; scroll-behavior: smooth; }
    
    /* Global Background: Parallax Star */
    .star-outline { position: absolute; top: 10%; left: 20%; width: 65vw; opacity: 0.08; z-index: -1; pointer-events: none; transition: transform 0.1s ease-out; }

    /* Hero Section: Offset Layout */
    .hero-title { font-weight: 200; letter-spacing: -0.02em; font-size: clamp(3rem, 12vw, 9rem); line-height: 0.9; position: relative; }
    .hero-image-wrap { position: relative; transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1); }
    .hero-image-wrap:hover { transform: translate(-10px, -10px) rotate(-1deg); }

    /* Album Section: Broken Grid & Depth */
    .album-vertical-list { height: 600px; overflow-y: auto; scrollbar-width: none; perspective: 1000px; padding: 20px 0; }
    .album-vertical-list::-webkit-scrollbar { display: none; }
    
    .album-item { cursor: pointer; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); filter: grayscale(100%); opacity: 0.2; transform-style: preserve-3d; }
    
    /* Define Broken Grid for Albums */
    .album-item:nth-child(even) { transform: translateX(30px) translateZ(0); }
    .album-item:nth-child(odd) { transform: translateX(-15px) translateZ(0); }
    
    /* Hover & Active States */
    .album-item:hover { filter: grayscale(0%); opacity: 1; transform: translateX(0px) scale(1.08) rotateX(10deg) !important; z-index: 10; }
    .album-item.active { filter: grayscale(0%); opacity: 1; transform: translateX(25px) translateZ(50px) !important; box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }

    /* Album Info: Typographic Fill */
    .album-detail-wrap { position: relative; transition: opacity 0.5s; overflow: visible; }
    .album-detail-wrap::before {
      content: attr(data-index);
      position: absolute;
      top: -60px;
      right: -30px;
      font-size: 18rem;
      font-weight: 900;
      color: rgba(0,0,0,0.03);
      font-family: 'Noto Serif SC', sans-serif;
      line-height: 1;
      z-index: -1;
      pointer-events: none;
    }
    
    .lyric-entry { border-left: 2px solid rgba(0,0,0,0.05); transition: all 0.3s; padding-left: 1.5rem; margin-bottom: 2rem; position: relative; }
    .lyric-entry:hover { border-left-color: rgba(0,0,0,1); background: #fbfbfb; transform: translateX(5px); }
    
    /* Scrapbook Section: Textural Shift */
    .scrapbook-section { position: relative; min-height: 160vh; width: 100%; border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #fafafa; overflow: hidden; padding: 100px 0; }
    .scrapbook-section::before { content:''; position: absolute; inset:0; background-image: radial-gradient(#e5e5e5 1px, transparent 1px); background-size: 20px 20px; opacity: 0.5; }
    
    .scrap-item { position: absolute; cursor: grab; transition: transform 0.3s, z-index 0.3s, filter 0.3s; z-index: 10; }
    .scrap-item:hover { z-index: 50 !important; filter: none !important; transform: scale(1.05) rotate(0deg) !important; }
    
    .scrap-item-text p { background: #fff; border: 1px solid #f1f1f1; }
    .scrap-item-img img { box-shadow: 10px 10px 30px rgba(0,0,0,0.05); }

    /* 艺术字结尾 */
    .lyric-art-block { font-family: 'Noto Serif SC', sans-serif; }
    .lyric-art-block span { display: inline-block; margin-right: 18px; margin-bottom: 10px; transition: transform 0.3s; }
    .lyric-art-block span:nth-child(even) { font-style: italic; font-weight: 200; transform: translateY(8px); }
    .lyric-art-block span:nth-child(3n) { font-weight: 900; letter-spacing: 0.1em; opacity: 0.8; }
  </style>
</head>
<body>

  <svg class="star-outline" id="bgStar" viewBox="0 0 512 512" fill="none" stroke="black" stroke-width="1.5">
    <path d="M256 40l61 168h175L350 312l54 160-148-98-148 98 54-160L20 208h175z"/>
  </svg>

  <header class="min-h-screen flex flex-col md:flex-row items-center justify-center px-10 md:px-24">
    <div class="flex-1 z-10">
      <h1 class="hero-title">ALL ABOUT<br>DESTINY.</h1>
      <p class="mt-14 text-2xl md:text-4xl italic tracking-tighter opacity-70">
        "one thing i can tell you is you got to be free"
      </p>
    </div>
    <div class="flex-1 flex justify-center md:justify-end md:-ml-32 mt-12 md:mt-0 hero-image-wrap z-0">
      <img src="https://i.ibb.co/m58hqtc6/IMG-6823.jpg" class="w-64 md:w-96 shadow-2xl rotate-2 transition-transform duration-700">
    </div>
  </header>

  <section class="py-40 px-10 md:px-24 flex flex-col md:flex-row gap-20 items-center">
    <div class="w-full md:w-[40%] album-vertical-list" id="albumList"></div>
    <div class="flex-1 flex justify-center relative">
      <div id="albumDetail" class="album-detail-wrap opacity-0 w-full max-w-xl">
        <h3 id="detailTitle" class="text-5xl font-extrabold mb-3 tracking-tighter"></h3>
        <p id="detailSongs" class="text-xs opacity-30 mb-12 tracking-widest uppercase"></p>
        <div class="space-y-6" id="albumLyricContainer"></div>
      </div>
    </div>
  </section>

  <section class="scrapbook-section" id="scrapbook"></section>

  <footer class="py-48 px-10 text-center flex flex-col items-center">
    <div class="lyric-art-block max-w-5xl text-3xl md:text-6xl leading-tight mb-72" id="artLyric"></div>
    <div class="max-w-xl mx-auto text-left w-full">
      <h2 class="text-4xl font-black mb-12">I WISH</h2>
      <div id="wishContainer" class="space-y-10"></div>
    </div>
  </footer>

  <script>
    // --- 1. 全局交互：星星随鼠标偏移 (Parallax) ---
    const starEl = document.getElementById('bgStar');
    window.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX - window.innerWidth / 2) * -0.015;
      const moveY = (e.clientY - window.innerHeight / 2) * -0.015;
      starEl.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    // --- 2. 专辑数据 ---
    const albums = [
      { id:1, name: 'EndSerenading (Mineral)', img: 'https://i.ibb.co/7dM4QCx4/IMG-6823.jpg', songs: 'Love Letter / Palisade / Gjs', lyrics: ['I will always be your favorite ghost.'] },
      { id:2, name: '我们的灵魂乐 (透明杂志)', img: 'https://i.ibb.co/pB7Wvb7D/IMG-6824.jpg', songs: '永远的等待 / 少女 / 我们的灵魂乐', lyrics: ['去更远的地方，去没有人的地方。'] },
      { id:3, name: '亲爱的…我还不知道 (张悬)', img: 'https://i.ibb.co/pBHns4Yd/IMG-6821.jpg', songs: '关于我爱你 / 信任的样子 / 并不', lyrics: ['深深的话要浅浅地说。'] },
      { id:4, name: '时间的歌 (陈绮贞)', img: 'https://i.ibb.co/whDZddfZ/IMG-6822.jpg', songs: '序曲 / 涟漪 / 柏拉图式的爱情', lyrics: ['有些事我不说，但我懂。'] },
      { id:5, name: '的士房间 (薄荷叶)', img: 'https://i.ibb.co/4nC6wM7G/IMG-6828.jpg', songs: '的士房间 / 破坏 / 19岁', lyrics: ['在的士房间里，我也迷失了自己。'] }
    ];

    // --- 3. 初始化唱片墙：错落布局 ---
    const listEl = document.getElementById('albumList');
    albums.forEach((alb, idx) => {
      const div = document.createElement('div');
      div.className = `album-item ${idx===0?'active':''}`;
      div.innerHTML = `<img src="${alb.img}" class="w-full shadow-lg">`;
      div.onclick = () => switchAlbum(alb, div);
      listEl.appendChild(div);
      if(idx === 0) switchAlbum(alb, div); // 初始化显示第一张
    });

    function switchAlbum(alb, el) {
      document.querySelectorAll('.album-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      
      const detailWrap = document.getElementById('albumDetail');
      detailWrap.style.opacity = 0;
      detailWrap.setAttribute('data-index', '0' + alb.id); // 填补留白的背景数字

      setTimeout(() => {
        document.getElementById('detailTitle').innerText = alb.name;
        document.getElementById('detailSongs').innerText = alb.songs;
        
        const container = document.getElementById('albumLyricContainer');
        container.innerHTML = '';
        alb.lyrics.forEach(l => {
          const div = document.createElement('div');
          div.className = 'lyric-entry group';
          div.innerHTML = `<p class="text-xl italic leading-relaxed">"${l}"</p>`;
          container.appendChild(div);
        });
        detailWrap.style.opacity = 1;
      }, 400);
    }

    // --- 4. 碎片专区：增加深度和混乱感 ---
    const initialScraps = [
      { type:'text', content:'每次出门都幻想自己会阅读。每次都带着书出门带着没电的手机和没翻开的书。好吧', x:80, y:200 },
      { type:'text', content:'I\'m trying to go on this path But you say I haven\' t get the jests', x:600, y:150 },
      { type:'text', content:'这个世界大概在我十七岁的时候就毁灭了，现在的每一天都只是我的幻觉。', x:150, y:550 },
      { type:'img', content:'https://i.ibb.co/jZvfc09z/IMG-5712.jpg', x:700, y:400, z:5 },
      { type:'img', content:'https://i.ibb.co/mFGz0qmf/IMG-7532.jpg', x:200, y:950, z:8 },
      { type:'img', content:'https://i.ibb.co/PskfMxGg/IMG-5116.jpg', x:800, y:900, z:12 },
      { type:'img', content:'https://i.ibb.co/BVZJFbZB/IMG-1072.jpg', x:100, y:1250, z:15 }
    ];

    const scrapContainer = document.getElementById('scrapbook');
    initialScraps.forEach((s, idx) => {
      const div = document.createElement('div');
      div.className = `scrap-item ${s.type === 'text' ? 'scrap-item-text' : 'scrap-item-img'}`;
      div.style.left = s.x + 'px';
      div.style.top = s.y + 'px';
      div.style.zIndex = (s.z || 10) + idx; // 初始Z轴层次错落

      // 视觉核心：增加初始随机微旋转 (破碎感)
      const randomRot = Math.random() * 10 - 5; // -5度 到 5度
      div.style.transform = `rotate(${randomRot}deg)`;
      
      const content = s.type === 'text' 
        ? `<p class="max-w-xs text-xl font-light p-4 shadow-xl">${s.content}</p>` 
        : `<img src="${s.content}" class="w-64 md:w-80 transition-transform duration-300 hover:rotate-0">`;
      
      div.innerHTML = content;
      scrapContainer.appendChild(div);
    });

    // --- 5. 艺术字结尾 ---
    const artText = "Time doesn't always heal, it just breathes and swallows memories Like the seasons change Sending showers, beating flowers into the mud";
    const artArtBlock = document.getElementById('artLyric');
    artText.split(' ').forEach(word => {
      const span = document.createElement('span');
      span.innerText = word;
      artArtBlock.appendChild(span);
    });

    // 6. I Wish 初始化 (静态演示)
    const wishes = [
      { content: '我希望这个世界永远有音乐。', name: 'Lonely Poet', time: '2026/03/15' },
      { content: 'I wish time could stop at some perfect moments.', name: 'Electric Dreamer', time: '2026/03/14' }
    ];
    const wishContainer = document.getElementById('wishContainer');
    wishes.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wish-entry border-l border-black/10 pl-6 py-1';
      div.innerHTML = `<p class="text-xl italic mb-3">"${w.content}"</p><span class="text-[9px] opacity-30 uppercase tracking-[0.2em]">@${w.name} — ${w.time}</span>`;
      wishContainer.appendChild(div);
    });
  </script>
</body>
</html>
