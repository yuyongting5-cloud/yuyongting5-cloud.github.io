  <script>
    const _supabase = supabase.createClient("https://ykymzuaobitdhoyyqmxp.supabase.co", "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS");
    const MASTER_CODE = "2026";
    let db = { albumLyrics: {}, customScraps: [], deletedInitials: [], wishes: [] };

    const initialScraps = [
      { id:'s1', type:'text', content:'每次出门都幻想自己会阅读。每次都带着书出门带着没电的手机和没翻开的书。好吧', x:80, y:200 },
      { id:'s2', type:'text', content:'I\'m trying to go on this path But you say I haven\' t get the jests', x:550, y:120 },
      { id:'s3', type:'text', content:'这个世界大概在我十七岁的时候就毁灭了，现在的每一天都只是我的幻觉。', x:120, y:500 },
      { id:'s4', type:'text', content:'手裡有打開門的鑰匙但我得承認我只喜欢在生命的房间开一扇窗', x:400, y:750 },
      { id:'s5', type:'img', content:'https://i.ibb.co/jZvfc09z/IMG-5712.jpg', x:650, y:350 },
      { id:'s6', type:'img', content:'https://i.ibb.co/mFGz0qmf/IMG-7532.jpg', x:180, y:900 },
      { id:'s7', type:'img', content:'https://i.ibb.co/PskfMxGg/IMG-5116.jpg', x:750, y:850 },
      { id:'s8', type:'img', content:'https://i.ibb.co/BVZJFbZB/IMG-1072.jpg', x:80, y:1200 }
    ];

    const albums = [
      { id:1, name: 'EndSerenading (Mineral)', img: 'https://i.ibb.co/7dM4QCx4/IMG-6823.jpg', songs: 'Love Letter / Palisade / Gjs' },
      { id:2, name: '我们的灵魂乐 (透明杂志)', img: 'https://i.ibb.co/pB7Wvb7D/IMG-6824.jpg', songs: '永远的等待 /少女 / 我们的灵魂乐' },
      { id:3, name: '亲爱的…我还不知道 (张悬)', img: 'https://i.ibb.co/pBHns4Yd/IMG-6821.jpg', songs: '关于我爱你 / 信任的样子 / 并不' },
      { id:4, name: '时间的歌 (陈绮贞)', img: 'https://i.ibb.co/whDZddfZ/IMG-6822.jpg', songs: '序曲 / 涟漪 / 柏拉图式的爱情' },
      { id:5, name: '的士房间 (薄荷叶)', img: 'https://i.ibb.co/mFGz0qmx/IMG-6828.jpg', songs: '的士房间 / 破坏 / 19岁' }
    ];

    async function load() {
      const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
      if (data) db = data.content;
      renderAll();
      document.getElementById('syncStatus').innerText = "Cloud: Connected";
    }

    function renderAll() {
      const listEl = document.getElementById('albumList');
      listEl.innerHTML = '';
      albums.forEach((alb, idx) => {
        const div = document.createElement('div');
        div.className = `album-item ${alb.id===window.currentId?'active':''}`;
        div.innerHTML = `<img src="${alb.img}" class="w-full shadow-lg">`;
        div.onclick = () => switchAlbum(alb, div);
        listEl.appendChild(div);
        if(idx===0 && !window.currentId) switchAlbum(alb, div);
      });
      renderScraps(); renderWishes(); renderLyrics();
    }

    function switchAlbum(alb, el) {
      document.querySelectorAll('.album-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active'); window.currentId = alb.id;
      const detail = document.getElementById('albumDetail');
      detail.style.opacity = 0; detail.setAttribute('data-index', '0' + alb.id);
      setTimeout(() => {
        document.getElementById('detailTitle').innerText = alb.name;
        document.getElementById('detailSongs').innerText = alb.songs;
        renderLyrics(); detail.style.opacity = 1;
      }, 300);
    }

    function renderScraps() {
      const box = document.getElementById('scrapbook');
      box.querySelectorAll('.scrap-item').forEach(el => el.remove());
      initialScraps.forEach(s => { if(!db.deletedInitials.includes(s.id)) renderOne(s, true); });
      db.customScraps.forEach((s, i) => renderOne(s, false, i));
    }

    function renderOne(s, isInit, idx) {
      const div = document.createElement('div');
      div.className = 'scrap-item'; div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
      div.style.transform = `rotate(${Math.random()*10-5}deg)`;
      div.innerHTML = (s.type==='text'? `<div class="bg-white p-4 shadow-xl border max-w-xs text-xl">${s.content}</div>` : `<img src="${s.content}" class="w-64 shadow-2xl">`) + 
                      `<div class="delete-mark" onclick="del(${isInit}, '${isInit?s.id:idx}')">×</div>`;
      document.getElementById('scrapbook').appendChild(div);
    }

    function renderLyrics() {
      const cont = document.getElementById('albumLyricContainer'); cont.innerHTML = '';
      (db.albumLyrics[window.currentId] || []).forEach((l, i) => {
        const d = document.createElement('div'); d.className = 'group border-l pl-4 hover:border-black';
        d.innerHTML = `<p class="italic text-xl">"${l}"</p><button onclick="delLyric(${i})" class="hidden group-hover:block text-[8px] opacity-30">[Delete]</button>`;
        cont.appendChild(d);
      });
    }

    function renderWishes() {
      const cont = document.getElementById('wishContainer'); cont.innerHTML = '';
      db.wishes.slice().reverse().forEach(w => {
        const d = document.createElement('div'); d.className = 'border-l pl-6 py-2';
        d.innerHTML = `<p class="text-xl italic">"${w.content}"</p><span class="text-[9px] opacity-20 block">@${w.name} — ${w.time}</span>`;
        cont.appendChild(d);
      });
    }

    let activeMode = '';
    function openModal(m) { activeMode = m; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; document.getElementById('modalInput').value = ''; }

    async function saveContent() {
      const val = document.getElementById('modalInput').value; if(!val) return;
      if(activeMode !== 'wish') {
        // 这里删掉了提示语里的 (2026)
        const pw = prompt("Archive Passcode Required:");
        if(pw !== MASTER_CODE) return alert("暗号不对");
      }
      if(activeMode === 'wish') db.wishes.push({ content: val, name: 'Soul Ghost', time: new Date().toLocaleString() });
      else if(activeMode === 'albumLyric') { if(!db.albumLyrics[window.currentId]) db.albumLyrics[window.currentId]=[]; db.albumLyrics[window.currentId].push(val); }
      else db.customScraps.push({ type: activeMode==='scrapText'?'text':'img', content: val, x: Math.random()*600, y: Math.random()*800+100 });
      await sync(); closeModal();
    }

    window.del = async (isInit, key) => {
      const pw = prompt("Delete Permission Required:"); if(pw !== MASTER_CODE) return;
      if(isInit) db.deletedInitials.push(key); else db.customScraps.splice(key, 1);
      await sync();
    };

    window.delLyric = async (i) => {
      const pw = prompt("Delete Permission Required:"); if(pw !== MASTER_CODE) return;
      db.albumLyrics[window.currentId].splice(i, 1); await sync();
    };

    async function sync() {
      await _supabase.from('archive_data').upsert({ id: 1, content: db });
      renderAll();
    }

    window.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX-window.innerWidth/2)*-0.01; const moveY = (e.clientY-window.innerHeight/2)*-0.01;
      document.getElementById('bgStar').style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    load();
  </script>
