<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All About Destiny | Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #fff; color: #000; font-family: 'Noto Serif SC', serif; overflow-x: hidden; scroll-behavior: smooth; }
    .star-outline { position: absolute; top: 10%; left: 20%; width: 65vw; opacity: 0.08; z-index: -1; pointer-events: none; transition: transform 0.1s ease-out; }
    .album-vertical-list { height: 650px; overflow-y: auto; scrollbar-width: none; perspective: 1000px; padding: 40px 0; }
    .album-item { cursor: pointer; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); filter: grayscale(100%); opacity: 0.2; margin-bottom: 40px; }
    .album-item:nth-child(even) { transform: translateX(30px); }
    .album-item:nth-child(odd) { transform: translateX(-15px); }
    .album-item:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.1) rotate(3deg) !important; z-index: 10; }
    .album-item.active { filter: grayscale(0%); opacity: 1; transform: translateX(20px) scale(1.05) !important; box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
    .album-detail-wrap { position: relative; min-height: 400px; }
    .album-detail-wrap::before { content: attr(data-index); position: absolute; top: -80px; right: -40px; font-size: 20rem; font-weight: 900; color: rgba(0,0,0,0.03); z-index: -1; pointer-events: none; }
    .scrapbook-section { position: relative; min-height: 160vh; width: 100%; border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #fafafa; overflow: hidden; }
    .scrap-item { position: absolute; transition: transform 0.3s; z-index: 10; }
    .delete-mark { position: absolute; bottom: -10px; right: -10px; width: 22px; height: 22px; background: #000; color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; z-index: 100; border: 2px solid #fff; }
    .scrap-item:hover .delete-mark { display: flex; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 1000; align-items: center; justify-content: center; }
    #syncStatus { position: fixed; top: 10px; right: 10px; font-size: 10px; color: #ccc; z-index: 2000; }
  </style>
</head>
<body>
  <div id="syncStatus">Cloud: Connecting...</div>
  <svg class="star-outline" id="bgStar" viewBox="0 0 512 512" fill="none" stroke="black" stroke-width="1.5"><path d="M256 40l61 168h175L350 312l54 160-148-98-148 98 54-160L20 208h175z"/></svg>

  <header class="min-h-screen flex flex-col md:flex-row items-center justify-center px-10 md:px-24">
    <div class="flex-1 z-10">
      <h1 class="text-[clamp(3rem,12vw,9rem)] font-light leading-[0.9]">ALL ABOUT<br>DESTINY.</h1>
      <p class="mt-14 text-2xl md:text-4xl italic opacity-60">"one thing i can tell you is you got to be free"</p>
    </div>
    <div class="flex-1 flex justify-center md:justify-end md:-ml-32 mt-12 md:mt-0">
      <img src="https://i.ibb.co/m58hqtc6/IMG-6823.jpg" class="w-64 md:w-96 shadow-2xl rotate-2">
    </div>
  </header>

  <section class="py-40 px-10 md:px-24 flex flex-col md:flex-row gap-20 items-center">
    <div class="w-full md:w-[40%] album-vertical-list" id="albumList"></div>
    <div class="flex-1 relative">
      <div id="albumDetail" class="album-detail-wrap opacity-0 transition-opacity duration-500">
        <h3 id="detailTitle" class="text-5xl font-black mb-2 tracking-tighter"></h3>
        <p id="detailSongs" class="text-xs opacity-30 mb-10 tracking-widest uppercase"></p>
        <div class="flex justify-between items-center border-b border-black mb-6 pb-2">
          <span class="text-[10px] uppercase tracking-widest">Archive Lyrics</span>
          <button onclick="openModal('albumLyric')" class="text-[10px] underline hover:font-bold">+ Add New</button>
        </div>
        <div id="albumLyricContainer" class="space-y-6"></div>
      </div>
    </div>
  </section>

  <section class="scrapbook-section" id="scrapbook">
    <div class="absolute top-10 left-10 z-[100] flex gap-4">
      <button onclick="openModal('scrapText')" class="bg-black text-white text-[10px] px-6 py-2 uppercase tracking-widest">+ Text</button>
      <button onclick="openModal('scrapImage')" class="bg-black text-white text-[10px] px-6 py-2 uppercase tracking-widest">+ Image URL</button>
    </div>
  </section>

  <footer class="py-48 px-10 text-center flex flex-col items-center">
    <div class="max-w-5xl text-3xl md:text-6xl leading-tight mb-72 italic font-light">Time doesn't always heal, it just breathes and swallows memories...</div>
    <div class="max-w-xl mx-auto text-left w-full">
      <div class="flex justify-between items-end mb-12 border-b border-black pb-2">
        <h2 class="text-4xl font-black">I WISH</h2>
        <button onclick="openModal('wish')" class="text-xs underline uppercase">Leave a message</button>
      </div>
      <div id="wishContainer" class="space-y-10"></div>
    </div>
    <div class="mt-40 text-[9px] tracking-[0.8em] opacity-20 uppercase">Built for the Unseen / 2026</div>
  </footer>

  <div id="globalModal" class="modal">
    <div class="modal-content text-center">
      <h4 id="modalType" class="text-[10px] uppercase tracking-widest mb-6 opacity-30">Archive Entry</h4>
      <textarea id="modalInput" class="w-full h-40 border-b border-black outline-none p-4 text-xl bg-transparent" placeholder="Write here..."></textarea>
      <div class="mt-8 flex justify-center gap-10">
        <button onclick="closeModal()" class="uppercase text-xs tracking-widest">Cancel</button>
        <button onclick="saveContent()" class="uppercase text-xs font-bold underline tracking-widest">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = "https://ykymzuaobitdhoyyqmxp.supabase.co";
    const SB_KEY = "sb_publishable_mU8Ivr3GpGOjugg2TxK5Jw_FCRxbtpS"; 
    const MASTER_CODE = "2026"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let db = { albumLyrics: {}, customScraps: [], deletedInitials: [], wishes: [] };

    // --- 💎 你的初始內容（已全部幫你填好） ---
    const initialScraps = [
      { id:'s1', type:'text', content:'每次出門都幻想自己會閱讀。每次都帶著書出門帶著沒電的手機和沒翻開的書。好吧', x:80, y:200 },
      { id:'s2', type:'text', content:'I\'m trying to go on this path But you say I haven\' t get the jests', x:550, y:120 },
      { id:'s3', type:'text', content:'這個世界大概在我十七歲的時候就毀滅了，現在的每一天都只是我的幻覺。', x:120, y:500 },
      { id:'s4', type:'text', content:'手裡有打開門的鑰匙但我得承認我只喜歡在生命的房間開一扇窗', x:400, y:750 },
      { id:'s5', type:'img', content:'https://i.ibb.co/jZvfc09z/IMG-5712.jpg', x:650, y:350 },
      { id:'s6', type:'img', content:'https://i.ibb.co/mFGz0qmf/IMG-7532.jpg', x:180, y:900 },
      { id:'s7', type:'img', content:'https://i.ibb.co/PskfMxGg/IMG-5116.jpg', x:750, y:850 },
      { id:'s8', type:'img', content:'https://i.ibb.co/BVZJFbZB/IMG-1072.jpg', x:80, y:1200 }
    ];

    const albums = [
      { id:1, name: 'EndSerenading (Mineral)', img: 'https://i.ibb.co/7dM4QCx4/IMG-6823.jpg', songs: 'Love Letter / Palisade / Gjs' },
      { id:2, name: '我們的靈魂樂 (透明雜誌)', img: 'https://i.ibb.co/pB7Wvb7D/IMG-6824.jpg', songs: '永遠的等待 / 少女 / 我們的靈魂樂' },
      { id:3, name: '親愛的…我還不知道 (張懸)', img: 'https://i.ibb.co/pBHns4Yd/IMG-6821.jpg', songs: '關於我愛你 / 信任的樣子 / 並不' },
      { id:4, name: '時間的歌 (陳綺貞)', img: 'https://i.ibb.co/whDZddfZ/IMG-6822.jpg', songs: '序曲 / 漣漪 / 柏拉圖式的愛情' },
      { id:5, name: '的士房間 (薄荷葉)', img: 'https://i.ibb.co/4nC6wM7G/IMG-6828.jpg', songs: '的士房間 / 破壞 / 19歲' }
    ];

    let currentAlbumId = 1;

    async function sync() {
        document.getElementById('syncStatus').innerText = "Syncing...";
        await _supabase.from('archive_data').upsert({ id: 1, content: db });
        document.getElementById('syncStatus').innerText = "Cloud: Saved";
    }

    async function load() {
        const { data } = await _supabase.from('archive_data').select('content').eq('id', 1).single();
        if (data && data.content) db = data.content;
        renderEverything();
        document.getElementById('syncStatus').innerText = "Cloud: Connected";
    }

    function renderEverything() { renderScraps(); renderWishes(); renderAlbumLyrics(); }

    const listEl = document.getElementById('albumList');
    listEl.innerHTML = '';
    albums.forEach((alb, idx) => {
      const div = document.createElement('div');
      div.className = `album-item ${idx===0?'active':''}`;
      div.innerHTML = `<img src="${alb.img}" class="w-full shadow-lg">`;
      div.onclick = () => switchAlbum(alb, div);
      listEl.appendChild(div);
      if(idx === 0) switchAlbum(alb, div);
    });

    function switchAlbum(alb, el) {
      document.querySelectorAll('.album-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active'); currentAlbumId = alb.id;
      const detail = document.getElementById('albumDetail');
      detail.style.opacity = 0; detail.setAttribute('data-index', '0' + alb.id);
      setTimeout(() => {
        document.getElementById('detailTitle').innerText = alb.name;
        document.getElementById('detailSongs').innerText = alb.songs;
        renderAlbumLyrics(); detail.style.opacity = 1;
      }, 400);
    }

    function renderAlbumLyrics() {
      const container = document.getElementById('albumLyricContainer');
      container.innerHTML = '';
      (db.albumLyrics[currentAlbumId] || []).forEach((l, idx) => {
        const div = document.createElement('div');
        div.className = 'group relative border-l border-black/5 pl-4 hover:border-black transition-all';
        div.innerHTML = `<p class="italic text-xl">"${l}"</p><button onclick="deleteLyric(${idx})" class="hidden group-hover:block text-[8px] opacity-30 mt-1 uppercase">[Delete]</button>`;
        container.appendChild(div);
      });
    }

    function renderScraps() {
      const container = document.getElementById('scrapbook');
      container.querySelectorAll('.scrap-item').forEach(i => i.remove());
      initialScraps.forEach(s => { if(!db.deletedInitials.includes(s.id)) renderOneScrap(s, true); });
      db.customScraps.forEach((s, idx) => renderOneScrap(s, false, idx));
    }

    function renderOneScrap(s, isInitial, indexInCustom) {
      const div = document.createElement('div');
      div.className = 'scrap-item group';
      div.style.left = s.x + 'px'; div.style.top = s.y + 'px';
      div.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
      const content = s.type === 'text' ? `<p class="max-w-xs text-xl font-light bg-white p-4 shadow-xl border border-black/5">${s.content}</p>` : `<img src="${s.content}" class="w-64 md:w-80 shadow-2xl">`;
      const delFunc = isInitial ? `deleteInitialScrap('${s.id}')` : `deleteCustomScrap(${indexInCustom})`;
      div.innerHTML = content + `<div class="delete-mark" onclick="${delFunc}">×</div>`;
      container.appendChild(div);
    }

    function renderWishes() {
      const container = document.getElementById('wishContainer');
      container.innerHTML = '';
      db.wishes.slice().reverse().forEach(w => {
        const div = document.createElement('div');
        div.className = 'border-l border-black/10 pl-6 py-2';
        div.innerHTML = `<p class="text-xl italic">"${w.content}"</p><span class="text-[9px] opacity-20 uppercase mt-2 block">@${w.name} — ${w.time}</span>`;
        container.appendChild(div);
      });
    }

    function checkAuth() {
        const pw = prompt("Archive Passcode Required:");
        if (pw === MASTER_CODE) return true;
        alert("暗號錯誤。"); return false;
    }

    let activeMode = '';
    function openModal(mode) { activeMode = mode; document.getElementById('modalType').innerText = mode; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; document.getElementById('modalInput').value = ''; }

    async function saveContent() {
      const val = document.getElementById('modalInput').value;
      if(!val) return;
      if(activeMode === 'wish') {
        const nicks=['Echo','Velvet','Neon'], roles=['Ghost','Poet','Soul'];
        const name = nicks[Math.floor(Math.random()*nicks.length)] + ' ' + roles[Math.floor(Math.random()*roles.length)];
        db.wishes.push({ content: val, name, time: new Date().toLocaleString() });
      } else {
        if(!checkAuth()) return;
        if(activeMode === 'albumLyric') {
            if(!db.albumLyrics[currentAlbumId]) db.albumLyrics[currentAlbumId] = [];
            db.albumLyrics[currentAlbumId].push(val);
        } else {
            db.customScraps.push({ type: activeMode==='scrapText'?'text':'img', content: val, x: Math.random()*(window.innerWidth-300)+50, y: Math.random()*1000+100 });
        }
      }
      renderEverything(); await sync(); closeModal();
    }

    window.deleteLyric = async (idx) => { if(!checkAuth()) return; db.albumLyrics[currentAlbumId].splice(idx, 1); renderAlbumLyrics(); await sync(); }
    window.deleteInitialScrap = async (id) => { if(!checkAuth()) return; db.deletedInitials.push(id); renderScraps(); await sync(); }
    window.deleteCustomScrap = async (idx) => { if(!checkAuth()) return; db.customScraps.splice(idx, 1); renderScraps(); await sync(); }

    window.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX-window.innerWidth/2)*-0.01; const moveY = (e.clientY-window.innerHeight/2)*-0.01;
      document.getElementById('bgStar').style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    document.getElementById('scrapbook').ondblclick = (e) => { if(e.target.id === 'scrapbook') openModal('scrapText'); }
    load();
  </script>
</body>
</html>
